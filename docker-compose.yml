version: '3.8'

services:
  # 1. Contenedor de la Base de Datos (PostgreSQL)
  db:
    image: postgres:15
    container_name: elysium_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password_seguro
      POSTGRES_DB: elysium_agenda
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d elysium_agenda"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Contenedor del Backend (Python / FastAPI)
  backend:
    build: ./backend
    container_name: elysium_backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://admin:password_seguro@db:5432/elysium_agenda
      - SECRET_KEY=dev-secret-key-change-in-production
    volumes:
      - ./backend:/app

  # 3. Contenedor del Frontend (React.js)
  frontend:
    build: ./frontend
    container_name: elysium_frontend
    command: npm start
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - HOST=0.0.0.0
      - CHOKIDAR_USEPOLLING=true
      - REACT_APP_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
